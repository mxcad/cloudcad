version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: cloucad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloucad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    networks:
      - cloucad-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cloucad-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - cloucad-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cloucad-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE: cloucad
      DB_SSL: false
      DB_MAX_CONNECTIONS: 20
      DB_CONNECTION_TIMEOUT: 30000
      DB_IDLE_TIMEOUT: 30000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      REDIS_DB: 0
      REDIS_MAX_RETRIES: 3
      REDIS_RETRY_DELAY: 100
      FILES_DATA_PATH: /app/filesData
      FILES_NODE_LIMIT: 300000
      STORAGE_CLEANUP_DELAY_DAYS: 30
      FILE_LOCK_TIMEOUT: 30000
      FILE_LOCK_RETRY_INTERVAL: 100
      FILE_LOCK_MAX_RETRIES: 3
      DISK_WARNING_THRESHOLD: 21474836480
      DISK_CRITICAL_THRESHOLD: 10737418240
      UPLOAD_MAX_SIZE: 104857600
      UPLOAD_ALLOWED_TYPES: .dwg,.dxf,.pdf,.png,.jpg,.jpeg
    ports:
      - '3001:3001'
    volumes:
      - ./filesData:/app/filesData
      - ./logs:/app/logs
    networks:
      - cloucad-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cloucad-network:
    driver: bridge
