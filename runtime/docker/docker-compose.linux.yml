# CloudCAD Linux Runtime 提取
# 用途：从 Docker 镜像提取 Linux 运行时组件
# 
# 使用方式：
#   docker-compose -f runtime/docker/docker-compose.linux.yml up --build
# 
# 或者单独提取：
#   docker-compose -f runtime/docker/docker-compose.linux.yml up --build node
#   docker-compose -f runtime/docker/docker-compose.linux.yml up --build postgres
#   docker-compose -f runtime/docker/docker-compose.linux.yml up --build redis
#   docker-compose -f runtime/docker/docker-compose.linux.yml up --build svn

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    volumes:
      - ../linux/node:/output

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    volumes:
      - ../linux/postgresql:/output

  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    volumes:
      - ../linux/redis:/output

  svn:
    build:
      context: .
      dockerfile: Dockerfile.svn
    volumes:
      - ../linux/subversion:/output
