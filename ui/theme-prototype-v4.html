<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudCAD 原型 v4 — Vuetify 原生主题适配</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  line-height:1.5;overflow:hidden;height:100vh;
  background:var(--v-background);color:var(--app-text-primary);
  transition:background-color .35s ease,color .35s ease;
}
*,*::before,*::after{transition:background-color .35s ease,border-color .35s ease,color .25s ease,box-shadow .35s ease}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--app-border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--app-text-muted)}

/* ============================================================
   CSS CUSTOM PROPERTIES — Direct map from myVuetifyThemeConfig.json
   ============================================================ */

/* --- DARK theme (default) --- */
:root, [data-theme="dark"]{
  /* Raw Vuetify variables */
  --v-surface:                    #212832;
  --v-background:                 #212832;
  --v-accent:                     #545555;
  --v-prominent:                  #3A4352;
  --v-hover-header-btn:           #3A4352;
  --v-modification:               #1E252F;
  --v-transition:                 #5D6675;
  --v-undertint:                  #AEABAB;
  --v-on-undertint:               #fff;
  --v-depth:                      #5D6675;
  --v-on-depth:                   #fff;
  --v-undertint-bg:               #2E3440;
  --v-depth-bg:                   #454F61;
  --v-inverse:                    #FFFFFF;
  --v-inverse1:                   #000000;
  --v-console:                    #787878;
  --v-on-console:                 #fff;
  --v-dialog-card:                #212832;
  --v-dialog-card-text:           #3A4352;
  --v-hover-electron-view-tab-btn-hover:   #3A4352;
  --v-hover-electron-view-tab-btn-action:  #616975;
  --v-nav-bg:                     #3A4352;
  --v-nav-bg-active:              #282A2D;
  --v-sketches-color:             #3A4352;
  --v-toolbar-header:             #2B3647;

  /* Derived app semantic tokens */
  --app-sidebar-bg:               var(--v-nav-bg);
  --app-sidebar-hover:            rgba(255,255,255,0.06);
  --app-sidebar-active:           var(--v-nav-bg-active);
  --app-topbar-bg:                rgba(33,40,50,0.92);
  --app-card-bg:                  var(--v-dialog-card);
  --app-card-hover:               #272E3A;
  --app-input-bg:                 var(--v-modification);
  --app-text-primary:             #E8E6E4;
  --app-text-secondary:           #B8B5B2;
  --app-text-tertiary:            #8A8783;
  --app-text-muted:               #6B6864;
  --app-text-inverse:             #1A1E24;
  --app-border-subtle:            rgba(255,255,255,0.05);
  --app-border-default:           rgba(255,255,255,0.10);
  --app-border-strong:            rgba(255,255,255,0.16);
  --app-border-focus:             rgba(153,180,209,0.45);
  --app-accent:                   var(--v-toolbar-header);
  --app-accent-hover:             #3A4C63;
  --app-accent-text:              #99B4D1;
  --app-accent-light:             rgba(43,54,71,0.30);
  --app-elevated-bg:              var(--v-prominent);
  --app-overlay:                  rgba(0,0,0,0.75);
  --app-shadow-sm:                0 1px 2px rgba(0,0,0,0.30);
  --app-shadow-md:                0 4px 6px rgba(0,0,0,0.40);
  --app-shadow-lg:                0 10px 15px rgba(0,0,0,0.50);
  --app-shadow-xl:                0 20px 25px rgba(0,0,0,0.60);
  --app-glow-accent:              0 0 20px rgba(43,54,71,0.35);
  --app-radius-sm:                6px;
  --app-radius-md:                8px;
  --app-radius-lg:                12px;
  --app-radius-xl:                16px;
  --app-radius-full:              9999px;

  /* Status colors */
  --app-success:                  #4ADE80;
  --app-success-bg:               rgba(74,222,128,0.12);
  --app-warning:                  #FBBF24;
  --app-warning-bg:               rgba(251,191,36,0.12);
  --app-error:                    #F87171;
  --app-error-bg:                 rgba(248,113,113,0.12);
  --app-info:                     #60A5FA;
  --app-info-bg:                  rgba(96,165,250,0.12);
  --app-online:                   #4ADE80;
  --app-offline:                  #9CA3AF;

  /* File type indicators */
  --ft-dwg:                       #5B7DAF;
  --ft-dwg-bg:                    rgba(91,125,175,0.15);
  --ft-dxf:                       #6B9A8E;
  --ft-dxf-bg:                    rgba(107,154,142,0.15);
  --ft-pdf:                       #C4827A;
  --ft-pdf-bg:                    rgba(196,130,122,0.15);
  --ft-img:                       #8A9AB4;
  --ft-img-bg:                    rgba(138,154,180,0.15);
  --ft-folder:                    #C4A55A;
  --ft-folder-bg:                 rgba(196,165,90,0.15);
}

/* --- LIGHT theme --- */
[data-theme="light"]{
  --v-surface:                    #FFFFFF;
  --v-background:                 #E0E0E0;
  --v-accent:                     #545555;
  --v-prominent:                  #FFFFFF;
  --v-hover-header-btn:           #B3B3B3;
  --v-modification:               #FFFFFF;
  --v-transition:                 #EFEFEF;
  --v-undertint:                  #3A4352;
  --v-on-undertint:               #000;
  --v-depth:                      #D3D1D1;
  --v-on-depth:                   #000;
  --v-undertint-bg:               #f0f0f0;
  --v-depth-bg:                   #EBE9E9;
  --v-inverse:                    #000000;
  --v-inverse1:                   #FFFFFF;
  --v-console:                    #787878;
  --v-on-console:                 #fff;
  --v-dialog-card:                #FFFFFF;
  --v-dialog-card-text:           #E0E0E0;
  --v-hover-electron-view-tab-btn-hover:   #DBDBDB;
  --v-hover-electron-view-tab-btn-action:  #FFFFFF;
  --v-nav-bg:                     #DBDBDB;
  --v-nav-bg-active:              #787878;
  --v-sketches-color:             #E8E8E8;
  --v-toolbar-header:             #99b4d1;

  /* Derived app semantic tokens */
  --app-sidebar-bg:               var(--v-nav-bg);
  --app-sidebar-hover:            rgba(0,0,0,0.06);
  --app-sidebar-active:           var(--v-nav-bg-active);
  --app-topbar-bg:                rgba(255,255,255,0.92);
  --app-card-bg:                  var(--v-dialog-card);
  --app-card-hover:               #F5F5F5;
  --app-input-bg:                 var(--v-modification);
  --app-text-primary:             #212832;
  --app-text-secondary:           #3A4352;
  --app-text-tertiary:            #6B7280;
  --app-text-muted:               #9CA3AF;
  --app-text-inverse:             #FFFFFF;
  --app-border-subtle:            rgba(0,0,0,0.06);
  --app-border-default:           rgba(0,0,0,0.10);
  --app-border-strong:            rgba(0,0,0,0.16);
  --app-border-focus:             rgba(153,180,209,0.55);
  --app-accent:                   var(--v-toolbar-header);
  --app-accent-hover:             #7DA3C4;
  --app-accent-text:              #5A7A9A;
  --app-accent-light:             rgba(153,180,209,0.25);
  --app-elevated-bg:              var(--v-prominent);
  --app-overlay:                  rgba(0,0,0,0.40);
  --app-shadow-sm:                0 1px 3px rgba(0,0,0,0.06);
  --app-shadow-md:                0 4px 8px rgba(0,0,0,0.10);
  --app-shadow-lg:                0 10px 20px rgba(0,0,0,0.15);
  --app-shadow-xl:                0 20px 30px rgba(0,0,0,0.20);
  --app-glow-accent:              0 0 20px rgba(153,180,209,0.30);
  --app-radius-sm:                6px;
  --app-radius-md:                8px;
  --app-radius-lg:                12px;
  --app-radius-xl:                16px;
  --app-radius-full:              9999px;

  /* Status colors */
  --app-success:                  #16A34A;
  --app-success-bg:               rgba(22,163,74,0.10);
  --app-warning:                  #D97706;
  --app-warning-bg:               rgba(217,119,6,0.10);
  --app-error:                    #DC2626;
  --app-error-bg:                 rgba(220,38,38,0.10);
  --app-info:                     #2563EB;
  --app-info-bg:                  rgba(37,99,235,0.10);
  --app-online:                   #16A34A;
  --app-offline:                  #9CA3AF;

  --ft-dwg:                       #3B6FB5;
  --ft-dwg-bg:                    rgba(59,111,181,0.10);
  --ft-dxf:                       #4A8A7A;
  --ft-dxf-bg:                    rgba(74,138,122,0.10);
  --ft-pdf:                       #B55A52;
  --ft-pdf-bg:                    rgba(181,90,82,0.10);
  --ft-img:                       #6A7A94;
  --ft-img-bg:                    rgba(106,122,148,0.10);
  --ft-folder:                    #B08A30;
  --ft-folder-bg:                 rgba(176,138,48,0.10);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-fade{animation:fadeIn .25s ease-out}
.anim-slide{animation:slideUp .25s ease-out}
.anim-scale{animation:scaleIn .2s ease-out}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* Sidebar */
.sidebar{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--app-sidebar-bg);border-right:1px solid var(--app-border-subtle);
  z-index:20;height:100vh;
}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;padding:18px 20px 14px;
}
.sidebar-logo-icon{
  width:38px;height:38px;border-radius:var(--app-radius-lg);flex-shrink:0;
  background:linear-gradient(135deg,var(--v-toolbar-header),var(--v-prominent));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15px;font-weight:700;
  box-shadow:var(--app-glow-accent);
}
.sidebar-logo-text{line-height:1.2}
.sidebar-logo-name{font-size:15px;font-weight:700;color:var(--app-text-primary);letter-spacing:-0.01em}
.sidebar-logo-sub{font-size:10px;color:var(--app-text-muted);font-weight:500}

.sidebar-nav{padding:6px 12px;flex:1;overflow-y:auto}
.sidebar-section-title{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--app-text-muted);padding:14px 12px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--app-radius-lg);
  cursor:pointer;color:var(--app-text-tertiary);font-size:13px;font-weight:500;
  text-decoration:none;transition:all .15s ease;margin-bottom:1px;
  position:relative;border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.nav-item:hover{background:var(--app-sidebar-hover);color:var(--app-text-secondary)}
.nav-item.active{
  background:var(--app-sidebar-active);color:#fff;font-weight:600;
}
.nav-item .nav-badge{
  margin-left:auto;font-size:10px;padding:1px 7px;border-radius:var(--app-radius-full);
  background:var(--app-error);color:#fff;font-weight:600;line-height:1.5;
}
.nav-item .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item .nav-icon svg{width:18px;height:18px}

/* Sidebar storage */
.sidebar-storage{
  margin:10px 12px;padding:14px;border-radius:var(--app-radius-lg);
  background:var(--app-card-bg);border:1px solid var(--app-border-subtle);
}
.storage-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;color:var(--app-text-tertiary);font-size:12px;font-weight:500}
.storage-bar{height:5px;border-radius:3px;background:var(--v-depth-bg);overflow:hidden;margin-bottom:6px}
.storage-bar-fill{
  height:100%;border-radius:3px;background:linear-gradient(90deg,var(--v-toolbar-header),var(--app-accent-text));
  transition:width .6s ease;
}
.storage-info{display:flex;justify-content:space-between;font-size:10px;color:var(--app-text-muted)}

/* Sidebar user */
.sidebar-user{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-top:1px solid var(--app-border-default);
}
.user-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--v-toolbar-header),var(--v-accent));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  box-shadow:0 2px 8px rgba(43,54,71,.30);
  transition:transform .15s ease;
}
.user-avatar:hover{transform:scale(1.08)}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--app-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--app-text-muted)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}

/* Topbar */
.topbar{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;z-index:10;
  background:var(--app-topbar-bg);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--app-border-subtle);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-breadcrumb{display:flex;align-items:center;gap:4px}
.breadcrumb-item{
  padding:4px 10px;border-radius:var(--app-radius-sm);font-size:13px;font-weight:500;
  color:var(--app-text-tertiary);white-space:nowrap;cursor:pointer;border:none;
  background:transparent;font-family:inherit;transition:all .12s ease;
}
.breadcrumb-item:hover{background:var(--app-card-hover);color:var(--app-text-secondary)}
.breadcrumb-item.current{color:var(--app-text-primary);font-weight:600}
.breadcrumb-sep{color:var(--app-text-muted);font-size:11px;flex-shrink:0}

.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-clock{display:flex;flex-direction:column;align-items:flex-end;padding:3px 10px;border-radius:var(--app-radius-sm);background:var(--app-input-bg)}
.topbar-clock .time{font-size:13px;font-weight:600;color:var(--app-text-primary)}
.topbar-clock .date{font-size:10px;color:var(--app-text-muted)}

/* Theme toggle button */
.theme-toggle{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--app-radius-md);
  cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;border:1px solid var(--app-border-default);
  color:var(--app-text-tertiary);background:var(--app-card-bg);transition:all .15s ease;
}
.theme-toggle:hover{color:var(--app-text-primary);border-color:var(--app-border-strong);background:var(--app-card-hover)}
.theme-toggle .theme-dot{width:8px;height:8px;border-radius:50%;background:var(--app-accent-text);transition:all .3s ease}
.theme-toggle svg{width:14px;height:14px}

/* Page content */
.page-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 32px}

/* ============================================================
   DASHBOARD
   ============================================================ */
.welcome-banner{
  border-radius:var(--app-radius-xl);padding:32px;margin-bottom:24px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--app-accent-light),transparent 60%);
  border:1px solid var(--app-border-subtle);
}
.welcome-banner h1{font-size:28px;font-weight:700;color:var(--app-text-primary);margin-bottom:4px;letter-spacing:-0.02em}
.welcome-banner p{font-size:13px;color:var(--app-text-tertiary)}
.welcome-actions{display:flex;gap:10px;margin-top:18px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  border-radius:var(--app-radius-xl);padding:20px;background:var(--app-card-bg);
  border:1px solid var(--app-border-subtle);cursor:pointer;
  transition:all .2s ease;box-shadow:var(--app-shadow-sm);
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--app-shadow-lg);border-color:var(--app-border-default)}
.stat-card-top{display:flex;align-items:flex-start;justify-content:space-between}
.stat-card-title{font-size:13px;color:var(--app-text-tertiary);font-weight:500;margin-bottom:4px}
.stat-card-value{font-size:28px;font-weight:700;color:var(--app-text-primary);margin-bottom:2px;letter-spacing:-0.02em}
.stat-card-sub{font-size:11px;color:var(--app-text-muted)}
.stat-card-icon{
  width:42px;height:42px;border-radius:var(--app-radius-lg);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}

.content-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
.content-panel{
  border-radius:var(--app-radius-xl);padding:20px;background:var(--app-card-bg);
  border:1px solid var(--app-border-subtle);
}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--app-text-primary)}
.panel-link{
  font-size:12px;color:var(--app-accent-text);cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:gap .15s ease;
  text-decoration:none;font-weight:500;
}
.panel-link:hover{gap:8px}

.file-item-compact{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--app-radius-md);
  cursor:pointer;transition:all .12s ease;
}
.file-item-compact:hover{background:var(--app-card-hover)}
.file-item-icon{width:36px;height:36px;border-radius:var(--app-radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-item-name{font-size:13px;font-weight:500;color:var(--app-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item-meta{font-size:11px;color:var(--app-text-muted);margin-top:1px;display:flex;align-items:center;gap:6px}

.quick-action{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--app-radius-md);
  cursor:pointer;transition:all .15s ease;font-size:13px;font-weight:500;
  color:var(--app-text-secondary);width:100%;text-align:left;border:none;
  background:transparent;font-family:inherit;
}
.quick-action:hover{background:var(--app-card-hover)}
.quick-action-icon{
  width:36px;height:36px;border-radius:var(--app-radius-md);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s ease;
}
.quick-action:hover .quick-action-icon{transform:scale(1.08)}
.quick-action-arrow{margin-left:auto;opacity:0;transition:all .15s ease;color:var(--app-text-muted)}
.quick-action:hover .quick-action-arrow{opacity:1;transform:translateX(4px)}

/* ============================================================
   PROJECTS PAGE
   ============================================================ */
.toolbar-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px 0;margin-bottom:16px;border-bottom:1px solid var(--app-border-subtle);flex-wrap:wrap;
}
.search-box{position:relative;flex:1;max-width:300px}
.search-box svg.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--app-text-muted);
}
.search-box input{
  width:100%;padding:9px 12px 9px 34px;border-radius:var(--app-radius-md);
  border:1px solid var(--app-border-default);background:var(--app-input-bg);
  color:var(--app-text-primary);font-size:13px;outline:none;font-family:inherit;
  transition:border-color .15s ease;
}
.search-box input::placeholder{color:var(--app-text-muted)}
.search-box input:focus{border-color:var(--app-accent-text);box-shadow:0 0 0 3px var(--app-accent-light)}

.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.project-card{
  border-radius:var(--app-radius-xl);padding:20px;background:var(--app-card-bg);
  border:1px solid var(--app-border-subtle);cursor:pointer;
  transition:all .2s ease;box-shadow:var(--app-shadow-sm);
}
.project-card:hover{transform:translateY(-2px);box-shadow:var(--app-shadow-lg);border-color:var(--app-border-default)}
.project-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.project-card-icon{
  width:42px;height:42px;border-radius:var(--app-radius-lg);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.project-card-menu{
  width:30px;height:30px;border-radius:var(--app-radius-sm);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;
  background:transparent;color:var(--app-text-tertiary);transition:all .12s ease;
}
.project-card:hover .project-card-menu{opacity:1}
.project-card-menu:hover{background:var(--app-card-hover);color:var(--app-text-primary)}
.project-card-name{font-size:15px;font-weight:600;color:var(--app-text-primary);margin-bottom:4px}
.project-card-desc{font-size:12px;color:var(--app-text-muted);margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-card-meta{display:flex;align-items:center;gap:16px;margin-bottom:12px;font-size:12px;color:var(--app-text-tertiary)}
.project-card-meta span{display:flex;align-items:center;gap:4px}
.project-card-meta svg{width:13px;height:13px}
.project-card-bottom{display:flex;align-items:center;justify-content:space-between}
.project-card-status{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--app-radius-full);
  display:flex;align-items:center;gap:4px;
}
.project-card-status .dot{width:6px;height:6px;border-radius:50%}
.status-active{background:var(--app-success-bg);color:var(--app-success)}
.status-active .dot{background:var(--app-success)}
.status-review{background:var(--app-warning-bg);color:var(--app-warning)}
.status-review .dot{background:var(--app-warning)}
.status-archived{background:var(--app-text-muted);color:var(--app-text-primary);opacity:0.6}
.status-archived .dot{background:var(--app-text-muted)}

.project-card-members{display:flex;align-items:center;gap:-6px}
.member-avatar{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--app-card-bg);
  font-size:10px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;
  margin-left:-6px;transition:transform .15s ease;
}
.member-avatar:first-child{margin-left:0}
.member-avatar:hover{transform:translateY(-2px);z-index:2}
.member-more{
  width:28px;height:28px;border-radius:50%;background:var(--app-card-hover);
  font-size:10px;color:var(--app-text-muted);display:flex;align-items:center;justify-content:center;
  margin-left:-6px;border:2px solid var(--app-card-bg);
}

/* Project card progress bar */
.project-progress{margin-top:12px}
.project-progress-bar{height:4px;border-radius:2px;background:var(--v-depth-bg);overflow:hidden;margin-bottom:4px}
.project-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v-toolbar-header),var(--app-accent-text));transition:width .5s ease}
.project-progress-label{font-size:10px;color:var(--app-text-muted)}

/* ============================================================
   FILE SYSTEM VIEW
   ============================================================ */
.folder-header{
  border-radius:var(--app-radius-xl);padding:18px 20px;background:var(--app-card-bg);
  border:1px solid var(--app-border-subtle);margin-bottom:16px;
}
.folder-header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.folder-header-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.btn-back{
  width:36px;height:36px;border-radius:var(--app-radius-md);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:transparent;color:var(--app-text-tertiary);transition:all .12s ease;
}
.btn-back:hover{background:var(--app-card-hover);color:var(--app-text-secondary)}
.btn-back svg{width:18px;height:18px}
.folder-header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

.filter-tabs{
  display:flex;align-items:center;gap:0;margin-bottom:0;
  border-bottom:1px solid var(--app-border-subtle);padding-bottom:12px;flex-wrap:wrap;
}
.filter-tab{
  padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;
  color:var(--app-text-tertiary);font-family:inherit;
  border-bottom:2px solid transparent;margin-bottom:-13px;transition:all .12s ease;
}
.filter-tab:hover{color:var(--app-text-secondary)}
.filter-tab.active{color:var(--app-accent-text);border-bottom-color:var(--app-accent-text)}
.filter-subgroup{
  display:flex;align-items:center;gap:4px;margin-left:12px;padding-left:12px;
  border-left:1px solid var(--app-border-subtle);
}
.filter-subbtn{
  padding:5px 10px;border-radius:var(--app-radius-sm);font-size:12px;font-weight:500;
  cursor:pointer;border:none;background:transparent;color:var(--app-text-tertiary);
  font-family:inherit;transition:all .12s ease;
}
.filter-subbtn.active{background:var(--app-card-hover);color:var(--app-text-primary)}
.filter-subbtn:hover{color:var(--app-text-secondary)}

/* File grid */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;padding:16px 0}
.file-card{
  border-radius:var(--app-radius-lg);padding:18px 12px 14px;background:var(--app-card-bg);
  border:1px solid var(--app-border-subtle);cursor:pointer;
  transition:all .2s ease;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;
  position:relative;
}
.file-card:hover{border-color:var(--app-border-default);transform:translateY(-1px);box-shadow:var(--app-shadow-md)}
.file-card.selected{border-color:var(--app-accent-text);box-shadow:0 0 0 2px var(--app-accent-light),var(--app-shadow-md)}
.file-card-thumb{width:56px;height:56px;display:flex;align-items:center;justify-content:center;transition:transform .2s ease}
.file-card:hover .file-card-thumb{transform:scale(1.08)}
.file-card-name{font-size:12px;font-weight:500;color:var(--app-text-primary);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.file-card-meta{font-size:10px;color:var(--app-text-muted)}
.file-card-tag{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--app-radius-sm);
  letter-spacing:.03em;text-transform:uppercase;
}
.file-card-checkbox{
  position:absolute;top:8px;left:8px;width:20px;height:20px;border-radius:50%;
  border:2px solid var(--app-border-strong);background:transparent;display:flex;
  align-items:center;justify-content:center;transition:all .12s ease;opacity:0;
}
.file-card:hover .file-card-checkbox,.file-card.selected .file-card-checkbox{opacity:1}
.file-card.selected .file-card-checkbox{background:var(--app-accent-text);border-color:var(--app-accent-text)}
.file-card-checkbox svg{width:10px;height:10px;color:#fff;display:none}
.file-card.selected .file-card-checkbox svg{display:block}
.file-card-menu-btn{
  position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:var(--app-radius-sm);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:transparent;color:var(--app-text-muted);opacity:0;transition:all .12s ease;
}
.file-card:hover .file-card-menu-btn{opacity:1}
.file-card-menu-btn:hover{background:var(--app-card-hover);color:var(--app-text-primary)}

/* File list */
.file-list{display:flex;flex-direction:column}
.file-row{
  display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--app-radius-md);
  cursor:pointer;transition:all .12s ease;border:1px solid transparent;
}
.file-row:hover{background:var(--app-card-hover);border-color:var(--app-border-subtle)}
.file-row.selected{background:var(--app-accent-light);border-color:var(--app-accent-text)}
.file-row-checkbox{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--app-border-strong);
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .12s ease;
}
.file-row.selected .file-row-checkbox{background:var(--app-accent-text);border-color:var(--app-accent-text)}
.file-row-checkbox svg{width:10px;height:10px;color:#fff;display:none}
.file-row.selected .file-row-checkbox svg{display:block}
.file-row-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-row-info{flex:1;min-width:0}
.file-row-name{font-size:13px;font-weight:500;color:var(--app-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-row-meta{font-size:11px;color:var(--app-text-muted);margin-top:2px;display:flex;gap:10px}
.file-row-tag{
  font-size:10px;padding:2px 8px;border-radius:var(--app-radius-sm);
  font-weight:600;letter-spacing:.02em;flex-shrink:0;text-transform:uppercase;
}
.file-row-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.row-action-btn{
  width:30px;height:30px;border-radius:var(--app-radius-sm);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;
  background:transparent;color:var(--app-text-tertiary);transition:all .12s ease;
}
.file-row:hover .row-action-btn{opacity:1}
.row-action-btn:hover{background:var(--app-card-hover);color:var(--app-text-secondary)}
.row-action-btn.danger:hover{background:var(--app-error-bg);color:var(--app-error)}
.row-action-btn svg{width:15px;height:15px}

/* Selection toolbar */
.selection-toolbar{
  display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--app-radius-lg);
  background:var(--app-accent);color:#fff;margin-bottom:12px;
  animation:slideDown .2s ease;
  box-shadow:var(--app-shadow-md);
}
.selection-toolbar .count{font-size:13px;font-weight:600;margin-right:8px}
.selection-toolbar .sep{width:1px;height:20px;background:rgba(255,255,255,0.2);margin:0 4px}

/* View toggle */
.view-toggle{display:flex;border-radius:var(--app-radius-md);overflow:hidden;border:1px solid var(--app-border-default)}
.view-toggle button{
  padding:7px 10px;border:none;background:transparent;cursor:pointer;
  color:var(--app-text-tertiary);transition:all .12s ease;display:flex;align-items:center;
}
.view-toggle button:hover{color:var(--app-text-secondary);background:var(--app-card-hover)}
.view-toggle button.active{background:var(--app-accent);color:#fff}
.view-toggle .vt-divider{width:1px;background:var(--app-border-default)}

/* Pagination */
.pagination{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-top:1px solid var(--app-border-subtle);margin-top:8px;
  font-size:12px;color:var(--app-text-muted);
}
.pagination-left{display:flex;align-items:center;gap:8px}
.pagination-right{display:flex;align-items:center;gap:4px}
.page-btn{
  min-width:32px;height:32px;border-radius:var(--app-radius-sm);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .12s ease;border:1px solid var(--app-border-default);
  background:var(--app-card-bg);color:var(--app-text-secondary);font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.page-btn:hover:not(:disabled){border-color:var(--app-border-strong);background:var(--app-card-hover)}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
.page-btn.active{background:var(--app-accent);border-color:var(--app-accent);color:#fff;font-weight:600}
.per-page-select{
  background:var(--app-input-bg);border:1px solid var(--app-border-default);
  color:var(--app-text-secondary);border-radius:var(--app-radius-sm);padding:5px 8px;
  font-size:11px;font-family:inherit;
}

/* ============================================================
   USERS & ROLES TABLE
   ============================================================ */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{
  text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--app-text-muted);
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--app-border-default);
}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--app-border-subtle);color:var(--app-text-secondary)}
.data-table tr:hover td{background:var(--app-card-hover)}
.data-table .user-cell{display:flex;align-items:center;gap:10px}

/* Toggle switch */
.toggle-switch{
  position:relative;display:inline-block;width:40px;height:22px;cursor:pointer;
}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;background:var(--v-depth-bg);border-radius:11px;transition:.2s ease;
}
.toggle-slider::before{
  content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.2s ease;
}
.toggle-switch input:checked+.toggle-slider{background:var(--app-success)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px)}

/* Status badge for table */
.status-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:var(--app-radius-full);
  font-size:11px;font-weight:500;
}
.status-badge .dot{width:6px;height:6px;border-radius:50%}
.status-badge.online{background:var(--app-success-bg);color:var(--app-success)}
.status-badge.online .dot{background:var(--app-success);animation:pulse-dot 2s infinite}
.status-badge.offline{background:var(--app-card-hover);color:var(--app-offline)}
.status-badge.offline .dot{background:var(--app-offline)}

/* ============================================================
   BUTTON SYSTEM
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--app-radius-md);
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;font-family:inherit;border:none;
}
.btn-primary{
  background:var(--app-accent);color:#fff;box-shadow:0 2px 8px rgba(43,54,71,.30);
  border:1px solid transparent;
}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(43,54,71,.40)}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{
  background:var(--app-card-bg);color:var(--app-text-secondary);
  border:1px solid var(--app-border-default);
}
.btn-secondary:hover{border-color:var(--app-border-strong);background:var(--app-card-hover)}
.btn-ghost{
  background:transparent;color:var(--app-text-tertiary);border:none;
}
.btn-ghost:hover{background:var(--app-card-hover);color:var(--app-text-secondary)}
.btn-danger{background:var(--app-error);color:#fff;border:1px solid transparent}
.btn-danger:hover{filter:brightness(1.1)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--app-radius-sm)}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center}

/* ============================================================
   BADGE
   ============================================================ */
.badge{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--app-radius-full);
  font-size:10px;font-weight:600;letter-spacing:.02em;
}
.badge-accent{background:var(--app-accent-light);color:var(--app-accent-text)}
.badge-success{background:var(--app-success-bg);color:var(--app-success)}
.badge-warning{background:var(--app-warning-bg);color:var(--app-warning)}
.badge-error{background:var(--app-error-bg);color:var(--app-error)}

/* ============================================================
   TOOLTIP
   ============================================================ */
[data-tooltip]{position:relative}
[data-tooltip]:hover::after{
  content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);padding:5px 10px;border-radius:var(--app-radius-sm);
  background:var(--app-elevated-bg);color:var(--app-text-primary);
  font-size:11px;white-space:nowrap;z-index:100;pointer-events:none;
  border:1px solid var(--app-border-default);box-shadow:var(--app-shadow-md);
}

/* ============================================================
   DROPDOWN / CONTEXT MENU
   ============================================================ */
.dropdown{
  position:absolute;top:100%;right:0;margin-top:6px;min-width:180px;
  border-radius:var(--app-radius-lg);background:var(--app-elevated-bg);
  border:1px solid var(--app-border-default);box-shadow:var(--app-shadow-xl);
  z-index:100;overflow:hidden;animation:scaleIn .15s ease;
}
.dropdown-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;
  color:var(--app-text-secondary);cursor:pointer;transition:all .08s ease;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.dropdown-item:hover{background:var(--app-card-hover)}
.dropdown-item.danger{color:var(--app-error)}
.dropdown-item.danger:hover{background:var(--app-error-bg)}
.dropdown-item svg{width:15px;height:15px}
.dropdown-divider{height:1px;background:var(--app-border-subtle);margin:4px 0}

/* Context menu */
.context-menu{
  position:fixed;min-width:160px;border-radius:var(--app-radius-lg);
  background:var(--app-elevated-bg);border:1px solid var(--app-border-default);
  box-shadow:var(--app-shadow-xl);z-index:200;overflow:hidden;animation:scaleIn .12s ease;
}
.context-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:12px;
  color:var(--app-text-secondary);cursor:pointer;transition:all .08s ease;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.context-item:hover{background:var(--app-card-hover)}
.context-item.danger{color:var(--app-error)}
.context-item.danger:hover{background:var(--app-error-bg)}
.context-divider{height:1px;background:var(--app-border-subtle);margin:4px 0}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:var(--app-radius-md);font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;box-shadow:var(--app-shadow-lg);
  animation:slideUp .25s ease;max-width:360px;
}
.toast-success{background:#065F46;color:#D1FAE5;border:1px solid #059669}
.toast-error{background:#7F1D1D;color:#FEE2E2;border:1px solid #DC2626}
.toast-info{background:var(--app-elevated-bg);color:var(--app-text-primary);border:1px solid var(--app-border-default)}
.toast svg{width:16px;height:16px;flex-shrink:0}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;
}
.empty-state svg{width:80px;height:80px;color:var(--app-text-muted);opacity:0.3;margin-bottom:16px}
.empty-state h3{font-size:16px;font-weight:600;color:var(--app-text-primary);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--app-text-muted);margin-bottom:16px}

/* ============================================================
   SKELETON
   ============================================================ */
.skeleton{
  background:linear-gradient(90deg,var(--app-card-hover)25%,var(--v-depth-bg)50%,var(--app-card-hover)75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--app-radius-sm);
}
.skeleton-text{height:14px;margin-bottom:8px;width:60%}
.skeleton-text.short{width:40%}
.skeleton-card{height:120px;border-radius:var(--app-radius-lg);margin-bottom:12px}
.skeleton-avatar{width:34px;height:34px;border-radius:50%}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:1024px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .content-grid{grid-template-columns:1fr}
  .project-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}
@media(max-width:768px){
  .sidebar{display:none}
  .page-content{padding:16px}
  .welcome-banner{padding:20px}
  .welcome-banner h1{font-size:20px}
  .topbar{padding:0 16px}
  .file-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px}
}
</style>

}
function getGreeting(){
  const h=new Date().getHours();
  if(h<6)return'夜深了';
  if(h<9)return'早上好';
  if(h<12)return'上午好';
  if(h<14)return'中午好';
  if(h<18)return'下午好';
  return'晚上好';
}

function showToast(msg,type='info'){
  const icons={success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'
  };
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  t.innerHTML=(icons[type]||icons.info)+msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s ease';setTimeout(()=>t.remove(),300)},2500);
}

// ============================================================
// CONTEXT MENU
// ============================================================
function showContextMenu(e,items){
  e.preventDefault();
  const menu=document.getElementById('contextMenu');
  menu.innerHTML=items.map((it,i)=>{
    if(it==='---')return '<div class="context-divider"></div>';
    const cls=it.danger?'danger':'';
    return `<button class="context-item ${cls}" data-action="${it.action}">${it.icon||''}${it.label}</button>`;
  }).join('');
  menu.style.display='block';
  menu.style.left=Math.min(e.clientX,window.innerWidth-170)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-menu.offsetHeight-10)+'px';

  // Bind click handlers
  menu.querySelectorAll('.context-item').forEach(btn=>{
    btn.onclick=function(){
      const action=this.dataset.action;
      const target=state.contextTarget;
      hideContextMenu();
      if(action==='rename')showToast('重命名: '+(target?target.name:'文件'),'info');
      else if(action==='download')showToast('开始下载...','success');
      else if(action==='delete')showToast('已移至回收站','info');
      else if(action==='move')showToast('移动到...','info');
      else if(action==='copy')showToast('已复制','info');
      else if(action==='version')showToast('查看版本历史','info');
      else if(action==='share')showToast('分享链接已复制','success');
      else if(action==='archive')showToast('已归档','info');
    };
  });

  document.addEventListener('click',hideContextMenu,{once:true});
}
function hideContextMenu(){
  const menu=document.getElementById('contextMenu');
  if(menu)menu.style.display='none';
  state.contextTarget=null;
}

              <button class="file-card-menu-btn" onclick="event.stopPropagation();state.contextTarget={name:'${f.name}',type:'${f.type}'};showContextMenu(event,[{label:'下载',action:'download'},{label:'重命名',action:'rename'},{label:'删除',action:'delete',danger:true}])"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>

              <div class="file-card-name">${f.name}</div>
              <div class="file-card-meta">${f.size} · ${f.updatedAt}</div>
              <div class="file-card-tag" style="background:${typeBg(f.type)};color:${typeColor(f.type)}">${f.type.toUpperCase()}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- List View -->
      <div id="fileListView" style="display:none">
        <div class="file-list">
          ${fileItems.map(f=>`
            <div class="file-row" data-name="${f.name.toLowerCase()}" data-type="${f.type}" onclick="toggleFileSelection(this,'${f.name}')">
              <div class="file-row-checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>

              <div class="file-row-actions">

                <button class="row-action-btn" data-tooltip="下载" onclick="event.stopPropagation();showToast('下载: ${f.name}','success')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/></svg></button>
                <button class="row-action-btn" data-tooltip="重命名" onclick="event.stopPropagation();showToast('重命名: ${f.name}','info')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="row-action-btn" data-tooltip="移动到" onclick="event.stopPropagation();showToast('移动: ${f.name}','info')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l7-7 7 7M5 15l7 7 7-7"/></svg></button>
                <button class="row-action-btn danger" data-tooltip="删除" onclick="event.stopPropagation();showToast('已删除: ${f.name}','info')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <div class="pagination-left">
          <span>共 ${fileItems.length} 条，第 1/1 页</span>
          <select class="per-page-select"><option>每页 20 条</option><option>每页 50 条</option></select>

// ============================================================
// NAVIGATION & RENDERING
// ============================================================
function navigateTo(view){
  state.view=view;
  state.activeProject=null;
  document.querySelectorAll('.nav-item[data-nav]').forEach(el=>el.classList.remove('active'));
  const nav=document.querySelector(`[data-nav="${view}"]`);
  if(nav)nav.classList.add('active');
  renderPage();
}
function renderPage(){
  const content=state.view==='dashboard'?renderDashboard()
    :state.view==='projects'?renderProjects()
    :state.view==='files'||state.view==='library'?renderFiles()
    :state.view==='users'?renderUsers()
    :state.view==='roles'?renderRoles():renderDashboard();
  document.getElementById('pageContent').innerHTML=content;
  bindFilterTabs();
}
function switchView(mode,btn){
  state.viewMode=mode;
  const grid=document.getElementById('fileGridView');
  const list=document.getElementById('fileListView');
  if(grid)grid.style.display=mode==='grid'?'block':'none';
  if(list)list.style.display=mode==='list'?'block':'none';
  const btns=btn.parentElement.querySelectorAll('button');
  btns.forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function filterItems(query,type){
  state.searchQuery=query;
  const sel=type==='project'?'.project-card':'.file-card,.file-row';
  document.querySelectorAll(sel).forEach(el=>{
    const name=(el.dataset.name||'').toLowerCase();
    el.style.display=name.includes(query.toLowerCase())?'':'none';
  });
}

// ============================================================
// FILE SELECTION
// ============================================================
function toggleFileSelection(el,name){
  if(el.classList.contains('selected')){
    el.classList.remove('selected');
    state.selectedFiles.delete(name);
  }else{
    el.classList.add('selected');
    state.selectedFiles.add(name);
  }
  updateSelectionToolbar();
}
function toggleMultiSelect(){
  const grid=document.querySelectorAll('.file-card');
  const list=document.querySelectorAll('.file-row');
  const all=[...grid,...list];
  if(state.selectedFiles.size>0){
    // Deselect all
    all.forEach(el=>el.classList.remove('selected'));
    state.selectedFiles.clear();
  }else{
    // Select visible
    all.forEach(el=>{
      if(el.style.display!=='none'){
        el.classList.add('selected');
        state.selectedFiles.add(el.dataset.name);
      }
    });
  }
  updateSelectionToolbar();
}
function updateSelectionToolbar(){
  const toolbar=document.getElementById('selectionToolbar');
  const count=document.getElementById('selectionCount');
  if(!toolbar||!count)return;
  if(state.selectedFiles.size>0){
    toolbar.style.display='flex';
    count.textContent=`已选 ${state.selectedFiles.size} 项`;
  }else{
    toolbar.style.display='none';
  }
}
function batchAction(action){
  const count=state.selectedFiles.size;
  if(count===0)return;
  const map={download:'批量下载',move:'批量移动',delete:'批量删除'};
  showToast(`${map[action]||action}: ${count} 个文件`,'info');
  state.selectedFiles.clear();
  updateSelectionToolbar();
  // Deselect UI
  document.querySelectorAll('.file-card.selected,.file-row.selected').forEach(el=>el.classList.remove('selected'));
}

// ============================================================
// FILTER TABS (delegated)
// ============================================================
function bindFilterTabs(){
  // Already handled via event delegation in init
}

// ============================================================
// INIT
// ============================================================
(function init(){
  // Theme
  let saved='dark';
  try{saved=localStorage.getItem('cloudcad-v4-theme')||'dark'}catch(e){}
  applyTheme(saved);

  // Sidebar nav
  document.querySelectorAll('.nav-item[data-nav]').forEach(item=>{
    item.addEventListener('click',function(){
      navigateTo(this.dataset.nav);
    });
  });

  // Delegate clicks for filter tabs, pagination, etc.
  document.getElementById('pageContent').addEventListener('click',function(e){
    const tab=e.target.closest('.filter-tab');
    if(tab){
      const parent=tab.parentElement;
      if(parent)parent.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
    }
    const subbtn=e.target.closest('.filter-subbtn');
    if(subbtn){
      const parent=subbtn.parentElement;
      if(parent)parent.querySelectorAll('.filter-subbtn').forEach(b=>b.classList.remove('active'));
      subbtn.classList.add('active');
    }
  });

  // Clock
  updateClock();
  setInterval(updateClock,1000);

  // Initial render
  renderPage();

  console.log('CloudCAD 原型 v4 已就绪');
  console.log('  ✓ 主题: myVuetifyThemeConfig.json 原生变量映射');
  console.log('  ✓ 暗色/亮色一键切换 | localStorage 持久化');
  console.log('  ✓ 仪表盘 / 项目管理 / 文件浏览 / 用户管理 / 角色权限');
  console.log('  ✓ 多选 + 批量操作 | 行级按钮 | 右键菜单 | Dropdown');
  console.log('  ✓ 搜索过滤 | 视图切换 | 分页 | Toast 通知');
})();
</script>
