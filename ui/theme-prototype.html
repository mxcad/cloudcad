<!DOCTYPE html>
<html lang="zh-CN" data-theme="new">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudCAD 主题原型 — 丝滑深色新方案</title>
<style>
/* ============================================
   重置 & 基础
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.5;overflow:hidden;height:100vh;display:flex;transition:background .4s ease,color .4s ease}

/* ============================================
   主题: 当前 Midnight Engineering
   ============================================ */
[data-theme="current"] {
  --bg-canvas:#0d0f12;
  --bg-primary:#141619;
  --bg-secondary:#1a1d21;
  --bg-tertiary:#22262b;
  --bg-elevated:#2a2f35;
  --bg-overlay:rgba(0,0,0,0.7);
  --text-primary:#f0f4f8;
  --text-secondary:#b8c5d1;
  --text-tertiary:#7a8a99;
  --text-muted:#5a6a7a;
  --text-inverse:#141619;
  --border-subtle:rgba(255,255,255,0.06);
  --border-default:rgba(255,255,255,0.1);
  --border-strong:rgba(255,255,255,0.15);
  --primary-50:#1e1b4b;
  --primary-100:#312e81;
  --primary-200:#4338ca;
  --primary-400:#6366f1;
  --primary-500:#818cf8;
  --primary-600:#a5b4fc;
  --accent-100:#0e4a5c;
  --accent-400:#0891b2;
  --accent-500:#06b6d4;
  --accent-600:#22d3ee;
  --success:#22c55e;
  --success-dim:rgba(34,197,94,0.15);
  --success-light:rgba(34,197,94,0.1);
  --warning:#f59e0b;
  --warning-dim:rgba(245,158,11,0.15);
  --error:#ef4444;
  --error-dim:rgba(239,68,68,0.15);
  --error-light:rgba(239,68,68,0.1);
  --info:#3b82f6;
  --info-dim:rgba(59,130,246,0.15);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 6px rgba(0,0,0,0.4);
  --shadow-lg:0 10px 15px rgba(0,0,0,0.5);
  --shadow-xl:0 20px 25px rgba(0,0,0,0.6);
  --glow-primary:0 0 20px rgba(99,102,241,0.4);
  --glow-accent:0 0 20px rgba(34,211,238,0.4);
}

/* ============================================
   主题: 全新 Silk Dark（丝滑深色）
   设计理念：
   - 表面层级间使用 2-3% 亮度微步进，消除生硬过渡
   - 边框使用更低不透明度，让层次由微妙的背景色差自然呈现
   - 强调色降低饱和度，融入整体氛围而非"跳出"
   - 参考 Linear / Vercel / Raycast 的精致暗色系统
   ============================================ */
[data-theme="new"] {
  --bg-canvas:#080B10;
  --bg-primary:#0D1117;
  --bg-secondary:#11161D;
  --bg-tertiary:#171C24;
  --bg-elevated:#1D232C;
  --bg-overlay:rgba(0,0,0,0.75);
  --text-primary:#E6EDF3;
  --text-secondary:#8B949E;
  --text-tertiary:#6E7681;
  --text-muted:#484F58;
  --text-inverse:#0D1117;
  --border-subtle:rgba(255,255,255,0.04);
  --border-default:rgba(255,255,255,0.065);
  --border-strong:rgba(255,255,255,0.1);
  --primary-50:rgba(108,130,255,0.08);
  --primary-100:rgba(108,130,255,0.14);
  --primary-200:rgba(108,130,255,0.22);
  --primary-400:#6C82FF;
  --primary-500:#8496FF;
  --primary-600:#9DABFF;
  --accent-100:rgba(50,180,190,0.14);
  --accent-400:#32B4BE;
  --accent-500:#3DC4CE;
  --accent-600:#5CD2DA;
  --success:#3FB950;
  --success-dim:rgba(63,185,80,0.12);
  --success-light:rgba(63,185,80,0.07);
  --warning:#D29922;
  --warning-dim:rgba(210,153,34,0.12);
  --error:#F85149;
  --error-dim:rgba(248,81,73,0.12);
  --error-light:rgba(248,81,73,0.07);
  --info:#58A6FF;
  --info-dim:rgba(88,166,255,0.12);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:0 4px 8px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 16px rgba(0,0,0,0.55);
  --shadow-xl:0 16px 32px rgba(0,0,0,0.6);
  --glow-primary:0 0 24px rgba(108,130,255,0.25);
  --glow-accent:0 0 24px rgba(50,180,190,0.2);
}

/* ============================================
   动画
   ============================================ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes spin{to{transform:rotate(360deg)}}

.animate-fadeIn{animation:fadeIn .4s ease-out}
.animate-slideUp{animation:slideUp .35s ease-out}
.skeleton{background:linear-gradient(90deg,var(--bg-tertiary)25%,var(--bg-secondary)50%,var(--bg-tertiary)75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.loading-spin{animation:spin .8s linear infinite}

/* ============================================
   布局框架
   ============================================ */
.app{display:flex;height:100vh;width:100vw;background:var(--bg-canvas);color:var(--text-primary);transition:background .3s ease,color .3s ease}

/* 侧边栏 */
.sidebar{width:272px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-secondary);border-right:1px solid var(--border-subtle);transition:background .3s ease,border-color .3s ease;overflow-y:auto}

.sidebar-logo{padding:16px 16px 12px;display:flex;align-items:center;gap:10px}
.sidebar-logo .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary-600),var(--primary-400));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;box-shadow:var(--glow-primary)}
.sidebar-logo .brand-text{line-height:1.15}
.sidebar-logo .brand-name{font-size:15px;font-weight:700;color:var(--text-primary);letter-spacing:-0.01em}
.sidebar-logo .brand-sub{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.03em}

.nav-section{padding:8px 12px}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:6px 12px 4px}

.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .2s ease;color:var(--text-tertiary);font-size:14px;font-weight:500;position:relative;text-decoration:none}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.nav-item.active{background:linear-gradient(135deg,var(--primary-600),var(--primary-400));color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.nav-item .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.nav-item.active .nav-icon{opacity:1}
.nav-item .nav-badge{margin-left:auto;font-size:11px;padding:1px 8px;border-radius:999px;background:var(--primary-100);color:var(--primary-500);font-weight:600}

.sidebar-bottom{border-top:1px solid var(--border-subtle);padding:12px;margin-top:auto}
.storage-bar{background:var(--bg-tertiary);border-radius:10px;padding:12px;border:1px solid var(--border-subtle)}
.storage-bar-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;color:var(--text-tertiary);font-size:13px;font-weight:500}
.storage-progress{height:4px;border-radius:2px;background:var(--bg-elevated);overflow:hidden;margin-bottom:6px}
.storage-progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent-500),var(--primary-500));transition:width .5s ease}
.storage-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}

.user-area{border-top:1px solid var(--border-subtle);padding:12px}
.user-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px;border-radius:10px;cursor:pointer;transition:all .2s ease;background:none;border:none;color:inherit;font:inherit;text-align:left}
.user-btn:hover{background:var(--bg-tertiary)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary-400),var(--accent-400));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text-muted)}

/* 主内容区 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(13,17,23,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-subtle);flex-shrink:0;transition:background .3s ease;z-index:10}
.topbar-time{display:flex;flex-direction:column;align-items:flex-end;padding:4px 10px;border-radius:8px;background:var(--bg-tertiary);font-size:13px}
.topbar-time .time{font-weight:600;color:var(--text-primary)}
.topbar-time .date{font-size:11px;color:var(--text-muted)}
.topbar-right{display:flex;align-items:center;gap:8px}

.theme-toggle-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s ease;border:1px solid var(--border-default);color:var(--text-tertiary);background:var(--bg-secondary)}
.theme-toggle-btn:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-tertiary)}
.theme-toggle-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-500);box-shadow:0 0 6px var(--accent-500)}
.theme-toggle-btn.alt .dot{background:var(--primary-500);box-shadow:0 0 6px var(--primary-500)}

.page-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 32px;transition:background .3s ease}

/* ============================================
   标签切换（仪表盘 vs 我的图纸）
   ============================================ */
.view-tabs{display:flex;gap:2px;padding:3px;background:var(--bg-tertiary);border-radius:10px;margin-bottom:24px;width:fit-content;border:1px solid var(--border-subtle)}
.view-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s ease;border:none;background:transparent;color:var(--text-tertiary);font-family:inherit}
.view-tab:hover{color:var(--text-secondary)}
.view-tab.active{background:var(--bg-secondary);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ============================================
   仪表盘
   ============================================ */
.welcome-banner{border-radius:16px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--primary-50)0%,rgba(50,180,190,.04)100%);border:1px solid var(--border-subtle)}
.welcome-banner h1{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:4px;letter-spacing:-0.02em}
.welcome-banner p{font-size:13px;color:var(--text-tertiary)}
.welcome-actions{display:flex;gap:10px;margin-top:16px}
.btn-primary{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s ease;border:none;color:#fff;background:linear-gradient(135deg,var(--primary-600),var(--primary-400));box-shadow:0 2px 8px rgba(99,102,241,.3);font-family:inherit}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.4)}
.btn-secondary-dash{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s ease;background:var(--bg-secondary);border:1px solid var(--border-default);color:var(--text-secondary);font-family:inherit}
.btn-secondary-dash:hover{border-color:var(--border-strong);background:var(--bg-tertiary)}
.btn-ghost{background:transparent;border:none;color:var(--text-tertiary);cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s ease;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;font-family:inherit}
.btn-ghost:hover{background:var(--bg-tertiary);color:var(--text-secondary)}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{border-radius:14px;padding:20px;background:var(--bg-secondary);border:1px solid var(--border-subtle);cursor:pointer;transition:all .25s ease;box-shadow:var(--shadow-sm)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border-default)}
.stat-card-header{display:flex;align-items:flex-start;justify-content:space-between}
.stat-card-title{font-size:13px;color:var(--text-tertiary);font-weight:500;margin-bottom:4px}
.stat-card-value{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:2px;letter-spacing:-0.02em}
.stat-card-sub{font-size:11px;color:var(--text-muted)}
.stat-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.content-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
.content-panel{border-radius:14px;padding:20px;background:var(--bg-secondary);border:1px solid var(--border-subtle)}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text-primary)}
.panel-link{font-size:12px;color:var(--primary-500);cursor:pointer;display:flex;align-items:center;gap:4px;transition:gap .2s ease;text-decoration:none;font-weight:500}
.panel-link:hover{gap:6px}

.file-item-compact{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s ease}
.file-item-compact:hover{background:var(--bg-tertiary)}
.file-item-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-item-name{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item-meta{font-size:11px;color:var(--text-muted);margin-top:1px;display:flex;align-items:center;gap:6px}
.file-item-meta span{color:var(--text-muted)}

.quick-action{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;cursor:pointer;transition:all .2s ease;font-size:13px;font-weight:500;color:var(--text-secondary);width:100%;text-align:left;background:none;border:none;font-family:inherit}
.quick-action:hover{background:var(--bg-tertiary)}
.quick-action-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s ease}
.quick-action:hover .quick-action-icon{transform:scale(1.08)}
.quick-action-arrow{margin-left:auto;opacity:0;transition:all .2s ease;color:var(--text-muted)}
.quick-action:hover .quick-action-arrow{opacity:1;transform:translateX(3px)}

.empty-state{display:flex;flex-direction:column;align-items:center;padding:28px;text-align:center}
.empty-state-icon{color:var(--text-muted);opacity:.5;margin-bottom:12px}
.empty-state-text{font-size:13px;color:var(--text-muted)}

/* ============================================
   我的图纸 / 项目管理
   ============================================ */
.folder-header{border-radius:14px;padding:20px;background:var(--bg-secondary);border:1px solid var(--border-subtle);margin-bottom:16px}
.folder-header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.folder-header-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.back-btn{padding:8px;border-radius:8px;cursor:pointer;color:var(--text-tertiary);transition:all .15s ease;background:none;border:none;display:flex;align-items:center}
.back-btn:hover{color:var(--text-secondary);background:var(--bg-tertiary)}
.breadcrumb{display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none}
.breadcrumb::-webkit-scrollbar{display:none}
.breadcrumb-item{padding:4px 8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-tertiary);white-space:nowrap;cursor:pointer;transition:all .15s ease;display:flex;align-items:center;gap:4px;background:none;border:none;font-family:inherit}
.breadcrumb-item:hover{color:var(--text-primary);background:var(--bg-tertiary)}
.breadcrumb-item.current{color:var(--text-primary);font-weight:600}
.breadcrumb-sep{color:var(--text-muted);font-size:11px;margin:0 1px}

.filter-tabs{display:flex;gap:2px;padding-bottom:12px;margin-bottom:0;border-bottom:1px solid var(--border-subtle);align-items:center;flex-wrap:wrap}
.filter-tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;border:none;background:none;color:var(--text-tertiary);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px}
.filter-tab:hover{color:var(--text-secondary)}
.filter-tab.active{color:var(--primary-500);border-bottom-color:var(--primary-500)}
.filter-group{display:flex;gap:2px;margin-left:12px;padding-left:12px;border-left:1px solid var(--border-subtle)}
.filter-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease;border:none;background:transparent;color:var(--text-tertiary);font-family:inherit}
.filter-btn:hover{color:var(--text-secondary)}
.filter-btn.active{background:var(--bg-tertiary);color:var(--text-primary)}

.toolbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap}
.search-box{position:relative;flex:1;max-width:280px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s ease;font-family:inherit}
.search-box input::placeholder{color:var(--text-muted)}
.search-box input:focus{border-color:var(--primary-500)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.toolbar-actions{display:flex;align-items:center;gap:6px}
.view-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border-default)}
.view-toggle button{padding:7px 10px;border:none;background:transparent;cursor:pointer;color:var(--text-tertiary);transition:all .15s ease;display:flex;align-items:center}
.view-toggle button:hover{color:var(--text-secondary)}
.view-toggle button.active{background:var(--primary-50);color:var(--primary-500)}
.view-toggle .vt-sep{width:1px;background:var(--border-default)}

.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:16px 0}
.file-card{border-radius:12px;padding:16px 12px 12px;background:var(--bg-secondary);border:1px solid var(--border-subtle);cursor:pointer;transition:all .2s ease;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.file-card:hover{border-color:var(--border-default);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.file-card-thumb{width:56px;height:56px;display:flex;align-items:center;justify-content:center;transition:transform .2s ease}
.file-card:hover .file-card-thumb{transform:scale(1.08)}
.file-card-name{font-size:12px;font-weight:500;color:var(--text-primary);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.file-card-meta{font-size:10px;color:var(--text-muted)}

.file-list-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all .12s ease;border:1px solid transparent}
.file-list-item:hover{background:var(--bg-tertiary);border-color:var(--border-subtle)}
.file-list-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-list-name{flex:1;font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-list-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px}
.file-list-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.02em;flex-shrink:0}

.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0;border-top:1px solid var(--border-subtle);margin-top:8px}
.page-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease;border:none;background:transparent;color:var(--text-tertiary);font-family:inherit}
.page-btn:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.page-btn.active{background:var(--primary-500);color:#fff;font-weight:600}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* ============================================
   SVG 图标内联样式
   ============================================ */
.folder-svg .bg{fill:#D4A843;stroke:#9B7B2A;stroke-width:1.5}
.folder-svg .front{fill:#F5E6C8;stroke:#9B7B2A;stroke-width:1.5}

}

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

// ============================================
// 交互逻辑
// ============================================
function renderPage() {
  const content = state.view === 'dashboard' ? renderDashboard() : renderFileSystem();
  document.getElementById('pageContent').innerHTML = content;
  updateColorPanel();
}

function navigateTo(view) {
  state.view = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-nav="${view}"]`)?.classList.add('active');
  renderPage();
}

function switchViewMode(mode, btn) {
  const gridView = document.getElementById('fileGridView');
  const listView = document.getElementById('fileListView');
  const buttons = btn.parentElement.querySelectorAll('button');
  buttons.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'grid') {
    gridView.style.display = 'block';
    listView.style.display = 'none';
  } else {
    gridView.style.display = 'none';
    listView.style.display = 'block';
  }
}

function filterFiles(query) {
  const items = document.querySelectorAll('.file-card, .file-list-item');
  items.forEach(item => {
    const name = item.getAttribute('data-name') || '';
    item.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
  });
}

function toggleTheme() {
  state.theme = state.theme === 'new' ? 'current' : 'new';
  document.documentElement.setAttribute('data-theme', state.theme);
  const btn = document.getElementById('themeToggle');
  const label = document.getElementById('themeLabel');
  if (state.theme === 'new') {
    btn.classList.add('alt');
    label.textContent = '新方案';
  } else {
    btn.classList.remove('alt');
    label.textContent = '旧方案';
  }
  updateColorPanel();
}

function updateColorPanel() {
  const style = getComputedStyle(document.documentElement);
  const colors = [
    { label: 'bg-primary', css: '--bg-primary' },
    { label: 'bg-secondary', css: '--bg-secondary' },
    { label: 'bg-tertiary', css: '--bg-tertiary' },
    { label: 'bg-elevated', css: '--bg-elevated' },
    { label: 'text-primary', css: '--text-primary' },
    { label: 'text-secondary', css: '--text-secondary' },
    { label: 'text-tertiary', css: '--text-tertiary' },
    { label: 'border-default', css: '--border-default' },
    { label: 'primary-500', css: '--primary-500' },
    { label: 'accent-500', css: '--accent-500' },
  ];
  const hex = c => {
    const val = style.getPropertyValue(c).trim();
    if (val.startsWith('rgba')) {
      const m = val.match(/[\d.]+/g);
      if (m && m.length >= 3) {
        return '#' + [m[0], m[1], m[2]].map(v => parseInt(v).toString(16).padStart(2,'0')).join('').toUpperCase();
      }
      return val;
    }
    if (val.startsWith('#')) return val.toUpperCase();
    return val;
  };
  document.getElementById('colorRows').innerHTML = colors.map(c => `
    <div class="color-row">
      <div class="color-swatch" style="background:var(${c.css})"></div>
      <div class="color-label">${c.label}</div>
      <div class="color-hex">${hex(c.css)}</div>
    </div>
  `).join('');

  document.getElementById('compareNote').innerHTML = state.theme === 'new'
    ? '✨ 新方案：层级色差仅 2-3% · 边框透明度 0.04-0.065 · 强调色内敛 · 图标暗色适配'
    : '📐 旧方案：层级色差约 4-5% · 边框透明度 0.06-0.10 · 强调色较亮';
}

// ============================================
// 导航绑定
// ============================================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    const nav = this.getAttribute('data-nav');
    if (nav === 'dashboard') navigateTo('dashboard');
    else if (nav === 'drawings' || nav === 'projects') navigateTo('files');
  });
});

// 实时时钟
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
  const date = now.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' });
  document.getElementById('liveTime').textContent = time;
  document.getElementById('liveDate').textContent = date;

  const hour = now.getHours();
  let greeting = '早上好';
  if (hour < 6) greeting = '夜深了';
  else if (hour < 9) greeting = '早上好';
  else if (hour < 12) greeting = '上午好';
  else if (hour < 14) greeting = '中午好';
  else if (hour < 18) greeting = '下午好';
  else greeting = '晚上好';
  const el = document.getElementById('greetingText');
  if (el) el.textContent = greeting + '，MxDev';
}
setInterval(updateClock, 1000);
updateClock();

// 初始渲染
renderPage();
