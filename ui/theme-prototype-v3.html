<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudCAD — CAD Industrial 主题原型 v3</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  line-height:1.5;overflow:hidden;height:100vh;
  background:var(--bg-canvas);color:var(--text-primary);
  transition:background-color .4s ease,color .4s ease;
}
*,*::before,*::after{transition:background-color .4s ease,border-color .4s ease,color .25s ease,box-shadow .4s ease}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ============================================================
   CSS CUSTOM PROPERTIES — CAD Industrial Palette
   Derived from myVuetifyThemeConfig.json
   ============================================================ */

/* --- DARK theme (default, matches CAD editor) --- */
:root, [data-theme="dark"]{
  --bg-canvas:#212832;
  --bg-primary:#262D38;
  --bg-secondary:#2B3340;
  --bg-tertiary:#313A48;
  --bg-elevated:#3A4352;
  --bg-overlay:rgba(18,22,28,0.85);
  --text-primary:#E8E6E4;
  --text-secondary:#B8B5B2;
  --text-tertiary:#8A8783;
  --text-muted:#6B6864;
  --text-inverse:#1A1E24;
  --border-subtle:rgba(255,255,255,0.06);
  --border-default:rgba(255,255,255,0.12);
  --border-strong:rgba(255,255,255,0.18);
  --border-focus:rgba(43,54,71,0.50);
  --brand-primary:#2B3647;
  --brand-secondary:#3A4352;
  --brand-light:#99B4D1;
  --nav-bg:#3A4352;
  --nav-bg-active:#282A2D;
  --sidebar-bg:#262D38;
  --topbar-bg:rgba(38,45,56,0.85);
  --card-bg:#2B3340;
  --input-bg:#262D38;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.30);
  --shadow-md:0 4px 6px rgba(0,0,0,0.40);
  --shadow-lg:0 10px 15px rgba(0,0,0,0.55);
  --shadow-xl:0 20px 25px rgba(0,0,0,0.6);
  --glow-brand:0 0 20px rgba(43,54,71,0.35);
  --status-success:#4ADE80;
  --status-warning:#FBBF24;
  --status-error:#F87171;
  --status-info:#60A5FA;
  --status-success-bg:rgba(74,222,128,0.12);
  --status-warning-bg:rgba(251,191,36,0.12);
  --status-error-bg:rgba(248,113,113,0.12);
  --status-info-bg:rgba(96,165,250,0.12);
}

/* --- LIGHT theme --- */
[data-theme="light"]{
  --bg-canvas:#F5F6F7;
  --bg-primary:#FFFFFF;
  --bg-secondary:#FAFBFC;
  --bg-tertiary:#F0F0F0;
  --bg-elevated:#FFFFFF;
  --bg-overlay:rgba(0,0,0,0.35);
  --text-primary:#212832;
  --text-secondary:#3A4352;
  --text-tertiary:#6B7280;
  --text-muted:#9CA3AF;
  --text-inverse:#FFFFFF;
  --border-subtle:rgba(0,0,0,0.06);
  --border-default:rgba(0,0,0,0.12);
  --border-strong:rgba(0,0,0,0.18);
  --border-focus:rgba(153,180,209,0.50);
  --brand-primary:#99B4D1;
  --brand-secondary:#6B8EA8;
  --brand-light:#B8D0E3;
  --nav-bg:#DBDBDB;
  --nav-bg-active:#787878;
  --sidebar-bg:#FFFFFF;
  --topbar-bg:rgba(255,255,255,0.85);
  --card-bg:#FFFFFF;
  --input-bg:#FFFFFF;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 8px rgba(0,0,0,0.10);
  --shadow-lg:0 10px 20px rgba(0,0,0,0.15);
  --shadow-xl:0 20px 30px rgba(0,0,0,0.18);
  --glow-brand:0 0 20px rgba(153,180,209,0.30);
  --status-success:#22C55E;
  --status-warning:#F59E0B;
  --status-error:#EF4444;
  --status-info:#3B82F6;
  --status-success-bg:rgba(34,197,94,0.10);
  --status-warning-bg:rgba(245,158,11,0.10);
  --status-error-bg:rgba(239,68,68,0.10);
  --status-info-bg:rgba(59,130,246,0.10);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.animate-fadeIn{animation:fadeIn .4s ease-out}
.animate-slideUp{animation:slideUp .35s ease-out}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* Sidebar */
.sidebar{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--sidebar-bg);border-right:1px solid var(--border-default);
  overflow-y:auto;z-index:20;
}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px}
.sidebar-logo .logo-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:700;
  box-shadow:var(--glow-brand);
}
.sidebar-logo .brand-text{line-height:1.15}
.sidebar-logo .brand-name{font-size:15px;font-weight:700;color:var(--text-primary);letter-spacing:-0.01em}
.sidebar-logo .brand-sub{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.03em}

.sidebar-nav{padding:8px 12px;flex:1}
.sidebar-section-title{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-muted);padding:12px 12px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  cursor:pointer;color:var(--text-tertiary);font-size:13px;font-weight:500;
  text-decoration:none;transition:all .2s ease;margin-bottom:2px;
}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.nav-item.active{
  background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary));
  color:#fff;box-shadow:0 2px 8px rgba(43,54,71,.35);
}
.nav-item .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.nav-item .nav-icon svg{width:18px;height:18px}

/* Sidebar storage */
.sidebar-storage{
  margin:12px;padding:14px;border-radius:12px;
  background:var(--bg-secondary);border:1px solid var(--border-subtle);
}
.storage-header{
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
  color:var(--text-tertiary);font-size:13px;font-weight:500;
}
.storage-bar{height:4px;border-radius:2px;background:var(--bg-elevated);overflow:hidden;margin-bottom:6px}
.storage-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--brand-secondary),var(--brand-primary));
  transition:width .5s ease;
}
.storage-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}

/* Sidebar user */
.sidebar-user{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-top:1px solid var(--border-default);
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:600;
  box-shadow:0 2px 8px rgba(43,54,71,.3);
}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--text-muted)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Topbar */
.topbar{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;z-index:10;
  background:var(--topbar-bg);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-subtle);
}
.topbar-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:-0.01em}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-time{
  display:flex;flex-direction:column;align-items:flex-end;
  padding:4px 10px;border-radius:8px;background:var(--bg-tertiary);
}
.topbar-time .time{font-size:13px;font-weight:600;color:var(--text-primary)}
.topbar-time .date{font-size:11px;color:var(--text-muted)}

/* Theme toggle button */
.theme-toggle-btn{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
  cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;
  border:1px solid var(--border-default);color:var(--text-tertiary);
  background:var(--bg-secondary);transition:all .2s ease;
}
.theme-toggle-btn:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-tertiary)}
.theme-toggle-btn .theme-dot{width:8px;height:8px;border-radius:50%;background:var(--brand-primary);box-shadow:0 0 6px var(--brand-primary)}
.theme-toggle-btn svg{width:14px;height:14px}

.page-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 32px}

/* ============================================================
   DASHBOARD
   ============================================================ */
.welcome-banner{
  border-radius:16px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(43,54,71,0.08)0%,rgba(58,67,82,0.04)100%);
  border:1px solid var(--border-subtle);
}
.welcome-banner h1{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:4px;letter-spacing:-0.02em}
.welcome-banner p{font-size:13px;color:var(--text-tertiary)}
.welcome-actions{display:flex;gap:10px;margin-top:16px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  border-radius:14px;padding:20px;background:var(--card-bg);
  border:1px solid var(--border-subtle);cursor:pointer;
  transition:all .25s ease;box-shadow:var(--shadow-sm);
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border-default)}
.stat-card-header{display:flex;align-items:flex-start;justify-content:space-between}
.stat-card-title{font-size:13px;color:var(--text-tertiary);font-weight:500;margin-bottom:4px}
.stat-card-value{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:2px;letter-spacing:-0.02em}
.stat-card-sub{font-size:11px;color:var(--text-muted)}
.stat-card-icon{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}

.content-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
.content-panel{
  border-radius:14px;padding:20px;background:var(--card-bg);
  border:1px solid var(--border-subtle);
}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text-primary)}
.panel-link{
  font-size:12px;color:var(--brand-light);cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:gap .2s ease;
  text-decoration:none;font-weight:500;
}
.panel-link:hover{gap:6px}

.file-item-compact{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;cursor:pointer;transition:all .15s ease;
}
.file-item-compact:hover{background:var(--bg-tertiary)}
.file-item-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-item-name{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item-meta{font-size:11px;color:var(--text-muted);margin-top:1px;display:flex;align-items:center;gap:6px}

.quick-action{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;
  cursor:pointer;transition:all .2s ease;font-size:13px;font-weight:500;
  color:var(--text-secondary);width:100%;text-align:left;
  background:none;border:none;font-family:inherit;
}
.quick-action:hover{background:var(--bg-tertiary)}
.quick-action-icon{
  width:34px;height:34px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .2s ease;
}
.quick-action:hover .quick-action-icon{transform:scale(1.08)}
.quick-action-arrow{
  margin-left:auto;opacity:0;transition:all .2s ease;color:var(--text-muted);
}
.quick-action:hover .quick-action-arrow{opacity:1;transform:translateX(3px)}

/* ============================================================
   FILE SYSTEM
   ============================================================ */
.folder-header{
  border-radius:14px;padding:20px;background:var(--card-bg);
  border:1px solid var(--border-subtle);margin-bottom:16px;
}
.folder-header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.folder-header-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.back-btn{
  padding:8px;border-radius:8px;cursor:pointer;color:var(--text-tertiary);
  transition:all .15s ease;background:none;border:none;display:flex;align-items:center;
}
.back-btn:hover{color:var(--text-secondary);background:var(--bg-tertiary)}
.back-btn svg{width:18px;height:18px}

.breadcrumb{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.breadcrumb::-webkit-scrollbar{display:none}
.breadcrumb-item{
  padding:4px 8px;border-radius:6px;font-size:13px;font-weight:500;
  color:var(--text-tertiary);white-space:nowrap;cursor:pointer;
  transition:all .15s ease;display:flex;align-items:center;gap:4px;
  background:none;border:none;font-family:inherit;
}
.breadcrumb-item:hover{color:var(--text-primary);background:var(--bg-tertiary)}
.breadcrumb-item.current{color:var(--text-primary);font-weight:600}
.breadcrumb-sep{color:var(--text-muted);font-size:11px;margin:0 2px;flex-shrink:0}

.folder-header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

.filter-tabs{
  display:flex;align-items:center;gap:2px;padding-bottom:12px;margin-bottom:0;
  border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;
}
.filter-tab{
  padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s ease;border:none;background:none;
  color:var(--text-tertiary);font-family:inherit;
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.filter-tab:hover{color:var(--text-secondary)}
.filter-tab.active{color:var(--brand-light);border-bottom-color:var(--brand-primary)}
.filter-group{
  display:flex;gap:2px;margin-left:12px;padding-left:12px;
  border-left:1px solid var(--border-subtle);
}
.filter-btn{
  padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s ease;border:none;
  background:transparent;color:var(--text-tertiary);font-family:inherit;
}
.filter-btn:hover{color:var(--text-secondary)}
.filter-btn.active{background:var(--bg-tertiary);color:var(--text-primary)}

.toolbar-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px 0;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;
}
.search-box{position:relative;flex:1;max-width:280px}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;border-radius:8px;
  border:1px solid var(--border-default);background:var(--input-bg);
  color:var(--text-primary);font-size:13px;outline:none;
  transition:border-color .2s ease;font-family:inherit;
}
.search-box input::placeholder{color:var(--text-muted)}
.search-box input:focus{border-color:var(--brand-primary)}
.search-box svg.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--text-muted);
}
.toolbar-actions{display:flex;align-items:center;gap:6px}

.view-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border-default)}
.view-toggle button{
  padding:7px 10px;border:none;background:transparent;cursor:pointer;
  color:var(--text-tertiary);transition:all .15s ease;display:flex;align-items:center;
}
.view-toggle button:hover{color:var(--text-secondary)}
.view-toggle button.active{background:var(--brand-primary);color:#fff}
.view-toggle .vt-sep{width:1px;background:var(--border-default)}

/* File grid */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:16px 0}
.file-card{
  border-radius:12px;padding:16px 12px 12px;background:var(--card-bg);
  border:1px solid var(--border-subtle);cursor:pointer;
  transition:all .2s ease;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.file-card:hover{border-color:var(--border-default);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.file-card-thumb{width:56px;height:56px;display:flex;align-items:center;justify-content:center;transition:transform .2s ease}
.file-card:hover .file-card-thumb{transform:scale(1.08)}
.file-card-name{
  font-size:12px;font-weight:500;color:var(--text-primary);
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;
}
.file-card-meta{font-size:10px;color:var(--text-muted)}

/* File list */
.file-list{display:flex;flex-direction:column}
.file-list-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:8px;cursor:pointer;transition:all .12s ease;
  border:1px solid transparent;
}
.file-list-item:hover{background:var(--bg-tertiary);border-color:var(--border-subtle)}
.file-list-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-list-info{flex:1;min-width:0}
.file-list-name{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-list-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px}
.file-list-tag{
  font-size:10px;padding:2px 8px;border-radius:4px;
  font-weight:600;letter-spacing:.02em;flex-shrink:0;
}

/* Pagination */
.pagination{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-top:1px solid var(--border-subtle);margin-top:8px;
  font-size:12px;color:var(--text-muted);
}
.pagination-left{display:flex;align-items:center;gap:8px}
.pagination-right{display:flex;align-items:center;gap:4px}
.page-btn{
  min-width:32px;height:32px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s ease;border:none;
  background:transparent;color:var(--text-tertiary);font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.page-btn:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.page-btn.active{background:var(--brand-primary);color:#fff;font-weight:600}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.per-page-select{
  background:var(--input-bg);border:1px solid var(--border-default);
  color:var(--text-secondary);border-radius:6px;padding:4px 8px;
  font-size:11px;font-family:inherit;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
  border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s ease;border:none;color:#fff;
  background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary));
  box-shadow:0 2px 8px rgba(43,54,71,.3);font-family:inherit;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(43,54,71,.4)}
.btn-secondary{
  display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
  border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;
  transition:all .2s ease;background:var(--bg-secondary);
  border:1px solid var(--border-default);color:var(--text-secondary);font-family:inherit;
}
.btn-secondary:hover{border-color:var(--border-strong);background:var(--bg-tertiary)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:4px;padding:6px 10px;
  border-radius:8px;cursor:pointer;transition:all .2s ease;
  background:transparent;border:none;color:var(--text-tertiary);
  font-size:12px;font-weight:500;font-family:inherit;
}
.btn-ghost:hover{background:var(--bg-tertiary);color:var(--text-secondary)}
.btn-ghost svg{width:14px;height:14px}

/* ============================================================
   FLOATING TUNE PANEL — Interactive Color Debugger
   ============================================================ */
.tune-panel{
  position:fixed;bottom:20px;right:20px;
  background:var(--bg-elevated);border:1px solid var(--border-default);

// ============================================
// CORE RENDERING & NAVIGATION
// ============================================
function renderPage() {
  const content = state.view === 'dashboard' ? renderDashboard() : renderFileSystem();
  document.getElementById('pageContent').innerHTML = content;
  if (state.view === 'dashboard') updateGreeting();
  renderTunePanel();
}

function navigateTo(view) {
  const viewMap = { dashboard: 'dashboard', projects: 'files', drawings: 'files', library: 'files' };
  state.view = viewMap[view] || 'dashboard';

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.querySelector(`[data-nav="${view}"]`);
  if (navItem) navItem.classList.add('active');
  else {
    // If navigating to files from stat cards, highlight drawings
    if (view === 'projects' || view === 'drawings') {
      const drawingsNav = document.querySelector('[data-nav="drawings"]');
      if (drawingsNav) drawingsNav.classList.add('active');
    }
  }
  renderPage();
}

function switchViewMode(mode, btn) {
  const gridView = document.getElementById('fileGridView');
  const listView = document.getElementById('fileListView');
  if (!gridView || !listView) return;
  const buttons = btn.parentElement.querySelectorAll('button');
  buttons.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.viewMode = mode;
  gridView.style.display = mode === 'grid' ? 'block' : 'none';
  listView.style.display = mode === 'list' ? 'block' : 'none';
}

function filterFiles(query) {
  state.searchQuery = query;
  const items = document.querySelectorAll('.file-card, .file-list-item');
  items.forEach(item => {
    const name = item.getAttribute('data-name') || '';
    item.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
  });
}

// ============================================
// THEME TOGGLE
// ============================================
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(state.theme);
  try { localStorage.setItem('cloudcad-theme-v3', state.theme); } catch(e) {}
}

function applyTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  const label = document.getElementById('themeLabel');
  const badge = document.getElementById('tuneThemeBadge');
  if (label) label.textContent = t === 'dark' ? '暗色主题' : '亮色主题';
  if (badge) badge.textContent = t === 'dark' ? '暗色' : '亮色';
  renderTunePanel();
}

// ============================================
// CLOCK & GREETING
// ============================================
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
  const date = now.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' });
  const timeEl = document.getElementById('liveTime');
  const dateEl = document.getElementById('liveDate');
  if (timeEl) timeEl.textContent = time;
  if (dateEl) dateEl.textContent = date;
}

function updateGreeting() {
  const hour = new Date().getHours();
  let greeting = '早上好';
  if (hour < 6) greeting = '夜深了';
  else if (hour < 9) greeting = '早上好';
  else if (hour < 12) greeting = '上午好';
  else if (hour < 14) greeting = '中午好';
  else if (hour < 18) greeting = '下午好';
  else greeting = '晚上好';
  const el = document.getElementById('greetingText');
  if (el) el.textContent = greeting + '，MxDev';
}

// ============================================
// INTERACTIVE TUNE PANEL
// ============================================
function renderTunePanel() {
  const root = document.documentElement;
  const style = getComputedStyle(root);
  const rows = TUNABLE_COLORS.map(c => {
    const currentVal = style.getPropertyValue(c.var).trim() || c.dftDark;
    return `
      <div class="tune-color-row">
        <div class="tune-color-swatch" style="background:${currentVal}">
          <input type="color" value="${toHexColor(currentVal)}" onchange="setColor('${c.var}', this.value)" title="${c.label}">
        </div>
        <span class="tune-color-label">${c.label}</span>
        <input type="text" class="tune-color-input" value="${currentVal}" onchange="setColor('${c.var}', this.value)" onfocus="this.select()">
      </div>
    `;
  }).join('');

  document.getElementById('tuneColorRows').innerHTML = rows;
}

function toHexColor(val) {
  val = val.trim();
  if (val.startsWith('#')) return val.substring(0, 7);
  // Try to parse rgba
  const m = val.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if (m) {
    return '#' + [m[1], m[2], m[3]].map(v => parseInt(v).toString(16).padStart(2, '0')).join('');
  }
  return val.substring(0, 7); // fallback
}

function setColor(varName, value) {
  document.documentElement.style.setProperty(varName, value);
  colorOverrides[varName] = value;
  // Re-render to update swatch and input
  renderTunePanel();
}

function resetThemeColors() {
  Object.keys(colorOverrides).forEach(v => {
    document.documentElement.style.removeProperty(v);
  });
  // Clear overrides
  for (const k in colorOverrides) delete colorOverrides[k];
  const defaults = state.theme === 'dark'
    ? Object.fromEntries(TUNABLE_COLORS.map(c => [c.var, c.dftDark]))
    : Object.fromEntries(TUNABLE_COLORS.map(c => [c.var, c.dftLight]));
  Object.entries(defaults).forEach(([v, val]) => {
    document.documentElement.style.setProperty(v, val);
  });
  renderTunePanel();
  showToast('已恢复默认配色');
}

function copyThemeCSS() {
  const style = getComputedStyle(document.documentElement);
  const prefix = state.theme === 'dark' ? ':root, [data-theme="dark"]' : '[data-theme="light"]';
  const lines = TUNABLE_COLORS.map(c => {
    const val = style.getPropertyValue(c.var).trim() || c.dftDark;
    return `  ${c.var}: ${val};`;
  });
  const css = `${prefix} {\n${lines.join('\n')}\n}`;
  copyToClipboard(css, 'CSS 变量');
}

function copyThemeJSON() {
  const style = getComputedStyle(document.documentElement);
  const config = {};
  TUNABLE_COLORS.forEach(c => {
    const val = style.getPropertyValue(c.var).trim() || c.dftDark;
    config[c.var] = val;
  });
  const json = JSON.stringify({ theme: state.theme, colors: config }, null, 2);
  copyToClipboard(json, 'JSON 配置');
}

function copyToClipboard(text, label) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast(`✅ ${label}已复制到剪贴板`));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`✅ ${label}已复制到剪贴板`);
  }
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'tune-copied-toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

// ============================================
// INITIALIZATION
// ============================================
(function init() {
  // Apply saved theme
  let saved = 'dark';
  try { saved = localStorage.getItem('cloudcad-theme-v3') || 'dark'; } catch(e) {}
  applyTheme(saved);

  // Bind sidebar navigation
  document.querySelectorAll('.nav-item[data-nav]').forEach(item => {
    item.addEventListener('click', function() {
      const nav = this.getAttribute('data-nav');
      navigateTo(nav);
    });
  });

  // Bind filter tabs (delegated — re-render aware)
  document.getElementById('pageContent').addEventListener('click', function(e) {
    const tab = e.target.closest('.filter-tab');
    if (tab) {
      tab.parentElement.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    }
    const btn = e.target.closest('.filter-btn');
    if (btn) {
      btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const pageBtn = e.target.closest('.page-btn:not(.active):not(:disabled)');
    if (pageBtn) {
      pageBtn.parentElement.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
      pageBtn.classList.add('active');
    }
  });

  // Start clock
  updateClock();
  setInterval(updateClock, 1000);

  // Initial render
  renderPage();

  console.log('🎨 CloudCAD 主题原型 v3 已就绪 — CAD Industrial Palette');
  console.log('   右下角调色板: 实时调色 | 📋 CSS 一键复制 | 📋 JSON 一键复制');
  console.log('   点击顶栏按钮切换暗色/亮色主题');
})();
